<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .quiz-card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-success">🧠 Smart Quiz Generator</h1>
                    <p class="text-muted">Upload PDF or paste notes to generate interactive quizzes.</p>
                </div>

                <div class="card quiz-card p-4 bg-white">
                    <form id="quizForm">
                        <div class="mb-3">
                            <label for="userEmail" class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control" id="userEmail" placeholder="student@example.com" required>
                        </div>

                        <!-- 📁 NEW: PDF File Upload Option -->
                        <div class="mb-3">
                            <label for="pdfFile" class="form-label fw-bold">Upload PDF Document (Optional)</label>
                            <input class="form-control" type="file" id="pdfFile" accept=".pdf, .txt">
                        </div>

                        <div class="text-center my-2 text-muted fw-bold">OR</div>

                        <div class="mb-4">
                            <label for="lectureNotes" class="form-label fw-bold">Paste Lecture Notes Instead</label>
                            <textarea class="form-control" id="lectureNotes" rows="5" placeholder="If you don't have a PDF, paste your text notes here..."></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" id="submitBtn" class="btn btn-success btn-lg fw-bold">✨ Generate Quiz Now</button>
                        </div>
                    </form>
                </div>
                
                <div id="successAlert" class="alert alert-success mt-4 d-none" role="alert">
                    🚀 <strong>Sent Successfully!</strong> AI is processing your document. Check your email inbox soon!
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('quizForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('userEmail').value;
            const notes = document.getElementById('lectureNotes').value;
            const fileInput = document.getElementById('pdfFile');
            const submitBtn = document.getElementById('submitBtn');
            const successAlert = document.getElementById('successAlert');

            submitBtn.disabled = true;
            submitBtn.innerText = "Uploading & Processing...";

            // 🔴 APNA MAKE.COM WEBHOOK URL YAHAN PASTE KAREIN
            const webhookUrl = "https://hook.eu1.make.com/7dm95ojhbxpgy8mnjwljvmufx92bpuhn";

            // Data ko Form format me bhejna taaki file transfer ho sake
            const formData = new FormData();
            formData.append("email", email);
            formData.append("notes", notes);
            if(fileInput.files.length > 0) {
                formData.append("file", fileInput.files[0]);
            }

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    body: formData // JSON ki jagah formData bhej rahe hain
                });

                if(response.ok) {
                    successAlert.classList.remove('d-none');
                    document.getElementById('quizForm').reset();
                } else {
                    alert("Error uploading to Webhook.");
                }
            } catch (error) {
                console.error("Connection error:", error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "✨ Generate Quiz Now";
            }
        });
    </script>
</body>
</html>
